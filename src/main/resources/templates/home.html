<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; padding: 25px; }
        h2 { margin: 0 0 10px 0; font-size: 1.4rem; }
        p { margin: 5px 0; font-size: 0.95rem; }
        .add-link { color: #007bff; text-decoration: none; font-size: 0.9rem; display: inline-block; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border: 1px solid #dee2e6; }
        th { background-color: #007bff; color: white; padding: 12px; border: 1px solid #dee2e6; font-size: 0.9rem; }
        td { padding: 12px; text-align: center; border: 1px solid #f1f3f5; font-size: 0.9rem; color: #333; }
        .logout-link { color: #007bff; text-decoration: none; display: block; margin-top: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
<h2 th:text="'MY Website ' + ${nimSaya}"></h2>
<p>Selamat datang di aplikasi!</p>
<a th:href="@{/form}" class="add-link">+ Input Data Mahasiswa</a>

<p style="margin-top:20px;"><strong>Data Mahasiswa</strong></p>
<table>
    <thead>
    <tr>
        <th style="width: 15%;">No</th>
        <th style="width: 35%;">Nama</th>
        <th style="width: 30%;">NIM</th>
        <th style="width: 20%;">Jenis Kelamin</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="mhs, stat : ${listMhs}">
        <td th:text="${stat.count}"></td>
        <td th:text="${mhs.nama}"></td>
        <td th:text="${mhs.nim}"></td>
        <td th:text="${mhs.jenisKelamin}"></td>
    </tr>
    <tr th:if="${#lists.isEmpty(listMhs)}">
        <td colspan="4" style="color: #888;">Belum ada data</td>
    </tr>
    </tbody>
</table>
<a th:href="@{/logout}" class="logout-link">Logout</a>
</body>
</html>
